name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx pydantic "fastapi[all]" "uvicorn[standard]" PyYAML python-multipart websockets
          pip install -r requirements.txt

      - name: Run all 17 tests
        run: pytest tests/ -v --tb=short

      - name: Verify all Python files compile
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/environment.py
          python -m py_compile app/models.py
          python -m py_compile inference.py
          python -m py_compile server/app.py
          echo "✅ All files compile"
